<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoPrivacyTool</title>
  <meta name="robots" content="noindex,follow">
  <link rel="alternate" hreflang="es" href="/es/">
  <link rel="alternate" hreflang="en" href="/en/">
  <link rel="alternate" hreflang="x-default" href="/">
  <meta http-equiv="refresh" content="0;url=/en/">
  <script>
    (function () {
      try {
        var langs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || ""]);
        var isSpanish = false;
        for (var i = 0; i < langs.length; i++) {
          var l = (langs[i] || "").toLowerCase();
          if (l === "es" || l.startsWith("es-")) { isSpanish = true; break; }
        }
        var target = isSpanish ? "/es/" : "/en/";
        if (location.pathname === "/" && location.search === "" && location.hash === "") {
          location.replace(target);
        } else {
          location.href = target;
        }
      } catch (e) {
        location.replace("/en/");
      }
    })();
  </script>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;padding:2rem;line-height:1.4}
    a{display:inline-block;margin-right:1rem}
  </style>
</head>
<body>
  <noscript>
    <h1>PhotoPrivacyTool</h1>
    <p>Please choose your language:</p>
    <p><a href="/es/">Español</a> <a href="/en/">English</a></p>
  </noscript>
</body>
</html>
